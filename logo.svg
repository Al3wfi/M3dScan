<!-- Validate Phone and Email -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  document.querySelectorAll("form").forEach(function (form) {
    const phoneInputs = form.querySelectorAll('input[type="tel"]');
    const emailInputs = form.querySelectorAll('input[type="email"]');

    phoneInputs.forEach(function (input) {
      input.placeholder = "+966 5xxxxxxxx";

      const errorMessage = createErrorMessage("Please enter a valid phone number.");
      input.parentNode.appendChild(errorMessage);

      input.addEventListener("focus", function () {
        if (!input.value.startsWith("+966 ")) {
          input.value = "+966 ";
        }
      });

      input.addEventListener("input", function () {
        let numberPart = input.value.replace("+966 ", "").replace(/\D/g, "");
        numberPart = numberPart.substring(0, 9);
        input.value = "+966 " + numberPart;
      });

      input.addEventListener("blur", function () {
        if (input.value === "+966 ") {
          input.value = "";
        }
      });

      input.dataset.errorId = "phone-error";
      input.errorMessageElement = errorMessage;
    });

    emailInputs.forEach(function (input) {
      const errorMessage = createErrorMessage("Please enter a valid email address.");
      input.parentNode.appendChild(errorMessage);

      input.dataset.errorId = "email-error";
      input.errorMessageElement = errorMessage;
    });

    form.addEventListener("submit", function (e) {
      let isFormValid = true;

      phoneInputs.forEach(function (input) {
        const numberPart = input.value.replace("+966 ", "").trim();
        const phoneRegex = /^(5\d{8}|1\d{8})$/;

        if (!phoneRegex.test(numberPart)) {
          isFormValid = false;
          input.errorMessageElement.style.display = "block";
        } else {
          input.errorMessageElement.style.display = "none";
        }
      });

      emailInputs.forEach(function (input) {
        const emailValue = input.value.trim();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!emailRegex.test(emailValue)) {
          isFormValid = false;
          input.errorMessageElement.style.display = "block";
        } else {
          input.errorMessageElement.style.display = "none";
        }
      });

      if (!isFormValid) {
        e.preventDefault();
        e.stopPropagation();

        const firstInvalidInput = form.querySelector(
          'input[type="tel"], input[type="email"]'
        );

        if (firstInvalidInput) {
          firstInvalidInput.focus();
        }
      }
    });
  });

  function createErrorMessage(text) {
    const errorMessage = document.createElement("div");
    errorMessage.style.color = "red";
    errorMessage.style.fontSize = "14px";
    errorMessage.style.marginTop = "5px";
    errorMessage.style.display = "none";
    errorMessage.textContent = text;
    return errorMessage;
  }
});
</script>
<!-- END Validate Phone and Email -->
